# This workflow runs linting checks on the codebase using isort and Flake8.
# It is triggered on every push to the repository, but can be adjusted to run on pull
# requests or on a schedule as needed.

name: "Apaleo API Client CI - Linter"

on: push

jobs:
  lint:
    name: Run Linting
    runs-on: ubuntu-latest

    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"     # create .venv inside repo for stable caching
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"                # track latest 3.12 patch

      - name: Cache Poetry & virtualenv
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            ./.venv
          key: >-
            poetry-${{ runner.os }}-py${{ steps.pyver.outputs.version || '3.12' }}-
            ${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py${{ steps.pyver.outputs.version || '3.12' }}-

      - name: Detect Python version (for cache key)
        id: pyver
        run: |
          echo "version=$(python -c 'import sys;print(".".join(map(str, sys.version_info[:2])))')" >> "$GITHUB_OUTPUT"

      - name: Install Poetry
        # pipx is typically preinstalled on GitHub runners; fall back to pip if needed.
        run: |
          if command -v pipx >/dev/null 2>&1; then
            pipx install --force poetry
          else
            python -m pip install --upgrade pip
            python -m pip install --no-cache-dir poetry
          fi
          poetry --version

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.in-project true
          poetry env use "$(python -c 'import sys;print(".".join(map(str, sys.version_info[:3])))')"

      - name: Install dependencies (with lint group)
        # Use lockfile; avoid reinstall if cached .venv already has deps
        run: |
          poetry install --no-root --no-interaction --no-ansi --with lint

      - name: Show tool versions
        run: |
          poetry run python --version
          poetry run isort --version-number
          poetry run flake8 --version

      - name: Run isort (check only)
        run: poetry run isort . --check --diff

      - name: Run Flake8
        run: poetry run flake8 .
