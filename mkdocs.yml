site_name: Apaleo API Client
site_description: A Python client library for the Apaleo API, providing easy access to Apaleo's features and functionalities.
site_url: https://lipppy.github.io/apaleo-api-client/

repo_name: lipppy/apaleo-api-client
repo_url: https://github.com/lipppy/apaleo-api-client

theme:
  name: material
  custom_dir: 'docs/theme'
  palette:
    - media: '(prefers-color-scheme)'
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-auto
        name: 'Switch to light mode'
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 'Switch to dark mode'
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 'Switch to system preference'
  features:
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - announce.dismiss
    - navigation.tabs
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
  logo: 'logo-white.svg'
  favicon: 'favicon.svg'

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - tables
  - toc:
      permalink: true
      title: Page contents
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist

nav:
  - Get Started:
      - Welcome to Apaleo API Client: index.md
      - Why use Apaleo API Client: main/why.md
      - Installation: main/install.md
      - Troubleshooting: main/troubleshooting.md
      - Contributing: main/contributing.md
      - Changelog: main/changelog.md
  - API Documentation:
      - Core API: api/core.md
  - Examples:
      - Client Configuration: examples/client.md
