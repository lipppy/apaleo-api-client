site_name: Apaleo API Client
site_description: A Python client library for the Apaleo API, providing easy access to Apaleo's features and functionalities.
site_url: https://lipppy.github.io/apaleo-api-client/

repo_name: lipppy/apaleo-api-client
repo_url: https://github.com/lipppy/apaleo-api-client

theme:
  name: material
  custom_dir: 'docs/theme'
  palette:
    - media: '(prefers-color-scheme)'
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-auto
        name: 'Switch to light mode'
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 'Switch to dark mode'
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 'Switch to system preference'
  features:
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - announce.dismiss
    - navigation.tabs
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
  logo: 'logo-white.svg'
  favicon: 'favicon.svg'

extra:
  version:
    provider: mike
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by
            using our <a href="..." target="_blank" rel="noopener">feedback form</a>.

extra_css:
  - extra/custom.css

extra_javascript:
  - 'extra/feedback.js'

plugins:
  - mike:
      alias_type: symlink
      canonical_version: latest
      # llmstxt must come after the mike plugin:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - tables
  - toc:
      permalink: true
      title: Page contents

  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist

nav:
  - Getting Started:
      - Overview: index.md
      - Why use Apaleo API Client: main/why.md
      - Installation: main/install.md
      - Troubleshooting: main/troubleshooting.md
      - Contributing: main/contributing.md
      - Changelog: main/changelog.md
  - API Reference:
      - Overview: api/index.md
      - Core API:
        - Inventory V1: api/core/inventory_v1.md
      - Identity API:
        - Identity V1: api/identity/identity_v1.md
  - Examples:
      - Overview: examples/index.md
      - Client Credentials Flow: examples/client_credentials_flow.md
      - Authorization Code Flow: examples/authorization_code_flow.md
