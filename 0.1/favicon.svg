<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#26a69a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00695c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#faviconGradient)"/>
  
  <!-- API Connection Symbol -->
  <g transform="translate(8, 10)">
    <!-- Left dot -->
    <circle cx="2" cy="6" r="2" fill="white"/>
    <!-- Right dot -->
    <circle cx="14" cy="6" r="2" fill="white"/>
    <!-- Connection line with arrow -->
    <line x1="4" y1="6" x2="12" y2="6" stroke="white" stroke-width="1.5"/>
    <polygon points="10,4.5 13,6 10,7.5" fill="white"/>
  </g>
  
  <!-- Small "A" at bottom -->
  <text x="16" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">A</text>
</svg>