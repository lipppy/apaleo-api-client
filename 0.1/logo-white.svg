<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26a69a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00695c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- API Connection Symbol -->
  <g transform="translate(10, 12)">
    <!-- Left circle (API) -->
    <circle cx="6" cy="13" r="5" fill="white" opacity="0.9"/>
    <circle cx="6" cy="13" r="3" fill="url(#tealGradient)"/>
    
    <!-- Right circle (Client) -->
    <circle cx="20" cy="13" r="5" fill="white" opacity="0.9"/>
    <circle cx="20" cy="13" r="3" fill="url(#tealGradient)"/>
    
    <!-- Connection line -->
    <line x1="11" y1="13" x2="15" y2="13" stroke="white" stroke-width="2" opacity="0.8"/>
    <polygon points="15,11 19,13 15,15" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="45" y="18" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white">
    Apaleo
  </text>
  <text x="45" y="32" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="white" opacity="0.8">
    API CLIENT
  </text>
  
  <!-- Python accent -->
  <circle cx="175" cy="25" r="12" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <text x="171" y="29" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="white" opacity="0.8">py</text>
</svg>